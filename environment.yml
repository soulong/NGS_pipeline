name: ngs
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # Core bioinformatics tools
  - salmon>=1.9
  - star>=2.7
  - bowtie2>=2.5
  - samtools>=1.15
  - bedtools>=2.30
  - bgzip
  - tabix
  - gffread
  
  # CRISPR screening
  - mageck
  
  # R and Bioconductor
  - r-base>=4.0
  - r-essentials
  - bioconductor-deseq2
  - bioconductor-edger
  - bioconductor-chipseeker
  - bioconductor-genomicranges
  - bioconductor-rsamtools
  - r-ggplot2
  - r-pheatmap
  - r-dplyr
  - r-tidyr
  - r-readr
  - r-stringr
  - r-tibble
  - r-purrr
  - r-qqnorm
  
  # Python packages
  - python>=3.8
  - pandas
  - numpy
  - matplotlib
  - seaborn
  - scipy
  - jupyter
  - jupyterlab
  - nbconvert
  - jupytext
  
  # Utilities
  - pip
  - nextflow
  - yaml
  
  # Pip packages (if not available in conda)
  - pip:
    - click
    - tqdm
